<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Digital Empire</title>
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1a1a6e" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a2e; color: #e2e8f0;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; text-align: center; padding: 2rem;
    }
    .container { max-width: 480px; }
    .icon { font-size: 5rem; margin-bottom: 1.5rem; }
    h1 { font-size: 2rem; margin-bottom: 1rem; }
    p { color: #94a3b8; line-height: 1.7; margin-bottom: 2rem; }
    a {
      display: inline-block; padding: 0.75rem 1.75rem;
      background: #4f46e5; color: #fff; border-radius: 10px;
      text-decoration: none; font-weight: 600;
      transition: background 0.2s;
    }
    a:hover { background: #4338ca; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Please check your network and try again.</p>
    <a href="/">Try Again</a>
  </div>
</body>
</html>

name: Deploy DIGITAL-EMPIRE PWA

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ── Validate ───────────────────────────────────────────────────────────────
  validate:
    name: Validate PWA & Paystack Config
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --omit=dev

      - name: Check required PWA files exist
        run: |
          required_files=(
            "index.html"
            "manifest.json"
            "service-worker.js"
            "app.js"
            "offline.html"
            "js/cart.js"
            "js/payment.js"
            "payment-success.html"
            "payment-failed.html"
            ".env.example"
          )
          missing=()
          for f in "${required_files[@]}"; do
            if [ ! -f "$f" ]; then
              missing+=("$f")
            fi
          done
          if [ ${#missing[@]} -gt 0 ]; then
            echo "❌ Missing required files:"
            printf '  - %s\n' "${missing[@]}"
            exit 1
          fi
          echo "✅ All required files present."

      - name: Validate manifest.json
        run: |
          node --input-type=commonjs << 'NODEEOF'
          var m = JSON.parse(require('fs').readFileSync('manifest.json','utf8'));
          var required = ['name','short_name','start_url','display','icons'];
          var absent = required.filter(function(k){ return !m[k]; });
          if (absent.length) { console.error('manifest.json missing fields:', absent.join(', ')); process.exit(1); }
          console.log('manifest.json valid');
          NODEEOF

      - name: Validate .env.example has Paystack keys
        run: |
          if ! grep -q "PAYSTACK_PUBLIC_KEY" .env.example; then
            echo "❌ .env.example missing PAYSTACK_PUBLIC_KEY"
            exit 1
          fi
          if ! grep -q "PAYSTACK_SECRET_KEY" .env.example; then
            echo "❌ .env.example missing PAYSTACK_SECRET_KEY"
            exit 1
          fi
          echo "✅ .env.example contains Paystack key placeholders"

      - name: Check Paystack SDK in index.html
        run: |
          if ! grep -q "js.paystack.co" index.html; then
            echo "❌ Paystack SDK not found in index.html"
            exit 1
          fi
          echo "✅ Paystack SDK reference found in index.html"

  # ── Deploy to GitHub Pages (static PWA) ───────────────────────────────────
  deploy-pages:
    name: Deploy to GitHub Pages
    needs: validate
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the whole repo (excluding server-side files for static hosting)
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # ── Node.js server smoke test ──────────────────────────────────────────────
  test-server:
    name: Server Smoke Test
    needs: validate
    runs-on: ubuntu-latest
    # Gate via env vars populated from secrets; the skip step exits early when they are absent.
    env:
      PAYSTACK_PUBLIC_KEY: ${{ secrets.PAYSTACK_PUBLIC_KEY }}
      PAYSTACK_SECRET_KEY: ${{ secrets.PAYSTACK_SECRET_KEY }}
      NODE_ENV: test
      APP_PORT: 3001
    steps:
      - name: Check Paystack secrets
        id: check-secrets
        run: |
          if [ -z "$PAYSTACK_PUBLIC_KEY" ] || [ -z "$PAYSTACK_SECRET_KEY" ]; then
            echo "⚠️  Paystack secrets not configured – skipping server smoke test."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check-secrets.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        if: steps.check-secrets.outputs.skip != 'true'
        run: npm ci

      - name: HTTP smoke test
        if: steps.check-secrets.outputs.skip != 'true'
        run: |
          node server.js &
          SERVER_PID=$!
          # Wait up to 15 seconds for server to accept connections
          READY=0
          for i in $(seq 1 15); do
            if curl -sf http://localhost:3001/api/csrf-token > /dev/null 2>&1; then
              echo "✅ Server responded on /api/csrf-token"
              READY=1
              break
            fi
            sleep 1
          done
          if [ "$READY" -eq 0 ]; then
            echo "❌ Server did not start in time"
            kill "$SERVER_PID"
            exit 1
          fi
          RESPONSE=$(curl -sf http://localhost:3001/api/csrf-token)
          echo "$RESPONSE" | grep -q "csrfToken" \
            && echo "✅ CSRF token endpoint working" \
            || (echo "❌ CSRF token endpoint failed: $RESPONSE" && kill "$SERVER_PID" && exit 1)
          kill "$SERVER_PID"
